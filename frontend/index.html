<script>

const API="https://citibim-6vzx.onrender.com/api";

async function updateDashboard(){

try{

const response=await fetch(API);

const data=await response.json();

document.getElementById("temp").innerText=data.dht_temperature+" °C";

document.getElementById("hum").innerText=data.dht_humidity+" %";

document.getElementById("bme_temp").innerText=data.bme_temperature+" °C";

document.getElementById("bme_hum").innerText=data.bme_humidity+" %";

document.getElementById("pressure").innerText=data.pressure+" Pa";

document.getElementById("lux").innerText=data.lux+" Lux";

document.getElementById("gsm").innerText=data.gsm_signal;

document.getElementById("sat").innerText=data.satellites;

document.getElementById("lat").innerText=data.latitude;

document.getElementById("lon").innerText=data.longitude;

document.getElementById("mapLink").href=
`https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

document.getElementById("time").innerText=
new Date(data.updated).toLocaleString();

}
catch(e){

console.log(e);

}

}

updateDashboard();

setInterval(updateDashboard,5000);

</script>
